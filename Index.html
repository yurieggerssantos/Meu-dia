<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#7c3aed"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Meu Dia"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg"/>
<title>Meu Dia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0b14;
  --surface: #13101f;
  --surface2: #1c1730;
  --surface3: #251e3a;
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow: #6d28d9;
  --purple-dim: #4c1d95;
  --text: #f1eeff;
  --text-sec: #9d8fc4;
  --text-dim: #5b4f7a;
  --border: rgba(124,58,237,0.18);
  --border-bright: rgba(167,139,250,0.3);
  --amber: #f59e0b;
  --teal: #14b8a6;
  --coral: #f43f5e;
  --green: #22c55e;
  --blue: #3b82f6;
  --pink: #ec4899;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
}

body {
  background-image:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(109,40,217,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(76,29,149,0.12) 0%, transparent 60%);
}

.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
}

.app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 6rem; }

/* HEADER */
.header {
  padding: 3.5rem 1.5rem 1.5rem;
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  backdrop-filter: blur(0px);
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--purple-light); font-family: 'Syne', sans-serif; font-weight: 600; }
.brand-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.date-badge {
  background: var(--surface2); border: 0.5px solid var(--border-bright);
  border-radius: 12px; padding: 6px 12px; font-size: 12px; color: var(--text-sec);
  font-family: 'Syne', sans-serif; font-weight: 500;
}

/* PROGRESS */
.progress-section { margin-bottom: 0.5rem; }
.progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.progress-text { font-size: 13px; color: var(--text-sec); }
.progress-pct { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--purple-light); }
.progress-track {
  height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--purple-dim), var(--purple-light));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(124,58,237,0.6);
  width: 0%;
}

/* NOTIF BANNER */
.notif-banner {
  margin: 0 1.5rem 1rem;
  background: var(--surface2); border: 0.5px solid var(--border-bright);
  border-radius: 14px; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.2s;
}
.notif-banner:hover { background: var(--surface3); }
.notif-icon { font-size: 16px; flex-shrink: 0; }
.notif-text { font-size: 13px; color: var(--text-sec); flex: 1; line-height: 1.4; }
.notif-btn {
  font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600;
  color: var(--purple-light); background: rgba(124,58,237,0.15);
  border: 0.5px solid var(--border-bright); border-radius: 8px;
  padding: 4px 10px; white-space: nowrap; cursor: pointer;
}

/* PERIOD */
.period {
  margin: 0 1.5rem 0.5rem;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
  display: flex; align-items: center; gap: 8px; margin-top: 1.75rem;
}
.period::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
.period:first-of-type { margin-top: 0.5rem; }

/* ITEM */
.item {
  margin: 0 1.5rem 6px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative; overflow: hidden;
}
.item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 99px 0 0 99px;
  background: var(--dot-color, var(--purple));
  opacity: 0.7;
}
.item:active { transform: scale(0.98); }
.item.done {
  opacity: 0.38;
  background: var(--surface);
}
.item.done .item-label { text-decoration: line-through; text-decoration-color: var(--text-dim); }

.checkbox {
  width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
  border: 1.5px solid var(--border-bright);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
}
.item.done .checkbox {
  background: var(--purple);
  border-color: var(--purple);
  box-shadow: 0 0 14px rgba(124,58,237,0.5);
}
.check-svg { display: none; }
.item.done .check-svg { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-label { font-size: 14px; color: var(--text); font-weight: 400; line-height: 1.3; }
.item-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; line-height: 1.3; }
.item-time { font-size: 11px; color: var(--text-dim); font-family: 'Syne', sans-serif; font-weight: 500; white-space: nowrap; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
  padding: 1.5rem 1.5rem 2rem;
  display: flex; justify-content: center;
}
.reset-btn {
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text-dim); background: var(--surface2);
  border: 0.5px solid var(--border); border-radius: 12px;
  padding: 10px 28px; cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.05em;
}
.reset-btn:hover { color: var(--text-sec); border-color: var(--border-bright); }

/* ALL DONE STATE */
.all-done {
  display: none; flex-direction: column; align-items: center;
  padding: 3rem 2rem; text-align: center; gap: 12px;
}
.all-done.show { display: flex; }
.all-done-icon { font-size: 48px; }
.all-done-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
.all-done-sub { font-size: 14px; color: var(--text-sec); line-height: 1.6; }

/* ANIMATIONS */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.item { animation: slideIn 0.3s ease both; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-label">cronograma</span>
        <span class="brand-title">Meu Dia</span>
      </div>
      <div class="date-badge" id="date-badge">seg</div>
    </div>
    <div class="progress-section">
      <div class="progress-row">
        <span class="progress-text" id="prog-text">0 de 14 concluídos</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
  </div>

  <div class="notif-banner" id="notif-banner" onclick="requestNotifs()">
    <span class="notif-icon">🔔</span>
    <span class="notif-text" id="notif-text">Ativar notificações nos horários do dia</span>
    <span class="notif-btn">Ativar</span>
  </div>

  <div id="list"></div>
  <div class="all-done" id="all-done">
    <span class="all-done-icon">✦</span>
    <span class="all-done-title">Dia completo!</span>
    <span class="all-done-sub">Você cumpriu tudo. Merece descansar à noite.</span>
  </div>
</div>

<div class="bottom-bar">
  <button class="reset-btn" onclick="resetAll()">↺ Novo dia</button>
</div>

<script>
const TASKS = [
  { period: "Manhã" },
  { id:1,  time:"07:00", label:"Acordar + café da manhã", sub:"Refeição leve antes do treino", color:"#888780" },
  { id:2,  time:"08:00", label:"Academia", sub:"Treino completo de 1h30", color:"#7c3aed" },
  { id:3,  time:"09:30", label:"Retorno para casa + descanso", sub:"Hidratação, recuperar o fôlego", color:"#14b8a6" },
  { id:4,  time:"10:00", label:"Tarefas do colégio", sub:"Adiantar tudo para a noite ficar livre", color:"#22c55e" },
  { id:5,  time:"11:30", label:"Banho + cuidados pessoais", sub:"Pós-treino, sem pressa", color:"#3b82f6" },
  { id:6,  time:"12:00", label:"Montar a marmita", sub:"Pronto para sair às 12:20", color:"#f59e0b" },
  { period: "Tarde" },
  { id:7,  time:"12:20", label:"Saída de casa + almoço", sub:"Comer a marmita antes ou durante", color:"#888780" },
  { id:8,  time:"13:30", label:"Trabalho", sub:"", color:"#f43f5e" },
  { period: "Fim de tarde / Noite" },
  { id:9,  time:"17:00", label:"Retorno para casa", sub:"Pode variar até 18:30", color:"#888780" },
  { id:10, time:"18:00", label:"Banho + se arrumar para o colégio", sub:"Jantar rápido se necessário", color:"#3b82f6" },
  { id:11, time:"18:45", label:"Colégio", sub:"", color:"#f43f5e" },
  { period: "Pós-colégio — modo descanso" },
  { id:12, time:"22:40", label:"Chegar em casa + lanche leve", sub:"", color:"#14b8a6" },
  { id:13, time:"22:55", label:"Skincare + cuidados pessoais", sub:"", color:"#ec4899" },
  { id:14, time:"23:20", label:"Lazer + relaxar à vontade", sub:"Séries, jogos, celular, descanso total", color:"#888780" },
];

const items = TASKS.filter(t => t.id);
let checked = JSON.parse(localStorage.getItem("meudio_v1") || "{}");

function save() { try { localStorage.setItem("meudio_v1", JSON.stringify(checked)); } catch(e){} }

function toggle(id) {
  checked[id] = !checked[id];
  save();
  updateItem(id);
  updateProgress();
}

function updateItem(id) {
  const el = document.getElementById("item-" + id);
  if (!el) return;
  el.classList.toggle("done", !!checked[id]);
}

function updateProgress() {
  const done = items.filter(t => checked[t.id]).length;
  const total = items.length;
  const pct = Math.round(done / total * 100);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = pct + "%";
  document.getElementById("prog-text").textContent = done + " de " + total + " concluídos";
  const allDone = document.getElementById("all-done");
  if (done === total) { allDone.classList.add("show"); }
  else { allDone.classList.remove("show"); }
}

function resetAll() {
  if (!confirm("Resetar o dia?")) return;
  checked = {};
  save();
  items.forEach(t => updateItem(t.id));
  updateProgress();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  let delay = 0;
  TASKS.forEach(t => {
    if (t.period) {
      const el = document.createElement("div");
      el.className = "period";
      el.textContent = t.period;
      list.appendChild(el);
    } else {
      const el = document.createElement("div");
      el.className = "item" + (checked[t.id] ? " done" : "");
      el.id = "item-" + t.id;
      el.style.setProperty("--dot-color", t.color);
      el.style.animationDelay = (delay * 40) + "ms";
      el.onclick = () => toggle(t.id);
      el.innerHTML = `
        <div class="checkbox">
          <svg class="check-svg" width="12" height="12" viewBox="0 0 12 12">
            <polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="item-body">
          <div class="item-label">${t.label}</div>
          ${t.sub ? `<div class="item-sub">${t.sub}</div>` : ""}
        </div>
        <div class="item-time">${t.time}</div>
      `;
      list.appendChild(el);
      delay++;
    }
  });
}

function updateDate() {
  const days = ["dom","seg","ter","qua","qui","sex","sáb"];
  const d = new Date();
  const day = days[d.getDay()];
  const date = d.getDate().toString().padStart(2,"0") + "/" + (d.getMonth()+1).toString().padStart(2,"0");
  document.getElementById("date-badge").textContent = day + " · " + date;
}

// NOTIFICATIONS
async function requestNotifs() {
  if (!("Notification" in window)) {
    alert("Seu navegador não suporta notificações.");
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === "granted") {
    document.getElementById("notif-banner").style.display = "none";
    scheduleNotifs();
    new Notification("Meu Dia ✦", { body: "Notificações ativadas! Vou te lembrar de cada tarefa.", icon: "icon.svg" });
  }
}

function scheduleNotifs() {
  items.forEach(t => {
    if (!t.time) return;
    const [h, m] = t.time.split(":").map(Number);
    const now = new Date();
    const target = new Date();
    target.setHours(h, m, 0, 0);
    let delay = target - now;
    if (delay < 0) delay += 24 * 60 * 60 * 1000;
    setTimeout(() => {
      if (!checked[t.id]) {
        new Notification("Meu Dia · " + t.time, { body: t.label, icon: "icon.svg", tag: "task-" + t.id });
      }
    }, delay);
  });
}

function initNotifs() {
  if (!("Notification" in window)) {
    document.getElementById("notif-banner").style.display = "none";
    return;
  }
  if (Notification.permission === "granted") {
    document.getElementById("notif-banner").style.display = "none";
    scheduleNotifs();
  } else if (Notification.permission === "denied") {
    document.getElementById("notif-text").textContent = "Notificações bloqueadas. Habilite nas configurações do navegador.";
  }
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}

render();
updateDate();
updateProgress();
initNotifs();
setInterval(updateDate, 60000);
</script>
</body>
</html>
